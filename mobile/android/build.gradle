// Top-level build file where you can add configuration options common to all sub-projects/modules.

// Kotlin Gradle Plugin version. expo-dev-client (and React Native 0.81's gradle
// plugin) ship Kotlin 2.1.0 metadata, so the compiler must be >= 2.1.0.
// NOTE: this must be set as a project-level `extra` property (read by
// expo-root-project / react-native rootproject plugins); gradle.properties
// `kotlinVersion` is NOT picked up by those plugins.
ext.kotlinVersion = "2.1.20"

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
