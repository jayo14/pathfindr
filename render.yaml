services:
  - type: web
    name: pathfindr-backend
    env: python
    buildCommand: pip install -r requirements && python manage.py migrate && python manage.py collectstatic --no-input && python manage.py seed_lasustech_data
    startCommand: gunicorn app.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pathfindr-db
          property: connectionString
      - key: AI_API_KEY
        sync: false
      - key: AI_PROVIDER
        value: openai
      - key: AI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_MODEL
        value: gpt-4o-mini

databases:
  - name: pathfindr-db
    plan: free
